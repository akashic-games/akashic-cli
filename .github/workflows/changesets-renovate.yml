name: Generate changeset for Renovate

on:
  pull_request:
    paths:
      - '.github/workflows/changesets-renovate.yml'
      - '**/package-lock.json'
      - '**/package.json'

env:
  NODE_VERSION: 24

permissions:
  contents: write

jobs:
  generate-changeset:
    runs-on: ubuntu-latest
    if: github.event.pull_request.user.login == 'renovate[bot]' && github.repository == 'akashic-games/akashic-cli' && contains(github.event.pull_request.labels.*.name, 'release')
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 2
          ref: ${{ github.head_ref }}
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - name: Run changesets-renovate
        run: |
          git config user.name 'github-actions'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          npm install --global @scaleway/changesets-renovate
          changesets-renovate
